services:
  api:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      APP_DATABASE_PATH: /data/cddm.db
      APP_SHUTDOWN_TIMEOUT: ${APP_SHUTDOWN_TIMEOUT:-10s}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com/}
      GITHUB_REQUEST_TIMEOUT: ${GITHUB_REQUEST_TIMEOUT:-15s}
      GITHUB_SYNC_TIMEOUT: ${GITHUB_SYNC_TIMEOUT:-2m}
      GITHUB_DEFAULT_POLL_INTERVAL: ${GITHUB_DEFAULT_POLL_INTERVAL:-5m}
      GITHUB_POLL_SCAN_INTERVAL: ${GITHUB_POLL_SCAN_INTERVAL:-15s}
      GITHUB_MAX_PAGES: ${GITHUB_MAX_PAGES:-10}
      GITHUB_MAX_ITEMS: ${GITHUB_MAX_ITEMS:-500}
      GITHUB_MAX_SYNC_CONCURRENCY: ${GITHUB_MAX_SYNC_CONCURRENCY:-4}
      OPENCODE_ENABLED: ${OPENCODE_ENABLED:-false}
      OPENCODE_ENDPOINT: ${OPENCODE_ENDPOINT:-http://host.docker.internal:4096}
      OPENCODE_PROVIDER: ${OPENCODE_PROVIDER:-}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-}
      OPENCODE_AGENT: ${OPENCODE_AGENT:-prompt-planner}
      OPENCODE_USERNAME: ${OPENCODE_USERNAME:-opencode}
      OPENCODE_PASSWORD: ${OPENCODE_PASSWORD:-}
      OPENCODE_TIMEOUT: ${OPENCODE_TIMEOUT:-45s}
      OPENCODE_MAX_REQUEST_BYTES: ${OPENCODE_MAX_REQUEST_BYTES:-262144}
      PROMPT_FALLBACK_ENABLED: ${PROMPT_FALLBACK_ENABLED:-true}
      PROMPT_EVIDENCE_LIMIT: ${PROMPT_EVIDENCE_LIMIT:-12}
      PROMPT_EVIDENCE_CHARS: ${PROMPT_EVIDENCE_CHARS:-4000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - cddm_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

  web:
    build:
      context: ./web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  cddm_data:
